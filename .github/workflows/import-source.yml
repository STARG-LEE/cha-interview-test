name: Import source repository

on:
  push:
    paths:
      - .github/workflows/import-source.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout destination
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Import sdkparkforbi/cha-interview-test
        shell: bash
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          curl -L "https://github.com/sdkparkforbi/cha-interview-test/archive/refs/heads/master.tar.gz" -o "$tmp/source.tar.gz"
          tar -xzf "$tmp/source.tar.gz" -C "$tmp"

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          shopt -s dotglob nullglob
          cp -a "$tmp/cha-interview-test-master"/* .

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No import changes to commit."
            exit 0
          fi
          git commit -m "Import sdkparkforbi/cha-interview-test source"
          git push
